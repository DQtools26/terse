<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TERSE Weather</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --glass: rgba(255,255,255,0.12);
  --glass-border: rgba(255,255,255,0.2);
  --glass-strong: rgba(255,255,255,0.2);
  --glass-hover: rgba(255,255,255,0.26);
  --text: #ffffff;
  --text2: rgba(255,255,255,0.7);
  --text3: rgba(255,255,255,0.4);
  --green: #4ade80; --yellow: #fbbf24; --orange: #fb923c; --red: #f87171;
  --radius: 20px; --radius-sm: 14px; --radius-xs: 8px;
  --blur: blur(20px);
}
[data-ui="storm"]  { --bg-a:#0b0e1c; --bg-b:#1a1040; --bg-c:#0f2040; --accent:#818cf8; --accent2:#c084fc; }
[data-ui="sky"]    { --bg-a:#c7dcf7; --bg-b:#ddd6fe; --bg-c:#bae6fd; --accent:#4f46e5; --accent2:#7c3aed; --glass:rgba(255,255,255,0.45); --glass-border:rgba(255,255,255,0.7); --glass-strong:rgba(255,255,255,0.55); --glass-hover:rgba(255,255,255,0.65); --text:#1e1b4b; --text2:rgba(30,27,75,0.65); --text3:rgba(30,27,75,0.38); }
[data-ui="sunset"] { --bg-a:#1a0430; --bg-b:#7c1d6f; --bg-c:#c2410c; --accent:#fb923c; --accent2:#f472b6; }

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;min-height:100vh;color:var(--text);overflow-x:hidden;font-size:15px;line-height:1.5;}

/* BG */
.bg{position:fixed;inset:0;z-index:0;background:linear-gradient(135deg,var(--bg-a) 0%,var(--bg-b) 50%,var(--bg-c) 100%);transition:background 0.6s;}
.orb{position:absolute;border-radius:50%;filter:blur(90px);animation:drift 14s ease-in-out infinite alternate;}
.orb:nth-child(1){width:600px;height:600px;top:-150px;left:-150px;background:var(--accent);opacity:0.2;animation-delay:0s;}
.orb:nth-child(2){width:500px;height:500px;bottom:-100px;right:-100px;background:var(--accent2);opacity:0.18;animation-delay:-5s;}
.orb:nth-child(3){width:350px;height:350px;top:45%;left:45%;background:var(--accent);opacity:0.1;animation-delay:-10s;}
@keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(40px,25px) scale(1.1)}}

/* LAYOUT */
#app{position:relative;z-index:1;min-height:100vh;}

/* GLASS */
.glass{background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-radius:var(--radius);}
.glass-sm{background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-radius:var(--radius-sm);}

/* LANDING */
#landing{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.land-card{width:100%;max-width:420px;background:var(--glass-strong);border:1px solid var(--glass-border);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-radius:28px;padding:36px 28px 28px;}
.land-logo{font-family:'Outfit',sans-serif;font-size:48px;font-weight:900;letter-spacing:-2.5px;line-height:1;margin-bottom:4px;}
.land-tag{font-size:14px;color:var(--text2);margin-bottom:28px;}
.land-lbl{font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.inp-wrap{position:relative;margin-bottom:8px;}
.gi{width:100%;background:rgba(255,255,255,0.08);border:1px solid var(--glass-border);border-radius:var(--radius-sm);padding:13px 48px 13px 16px;font-size:15px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;transition:background 0.2s,border-color 0.2s;}
.gi::placeholder{color:var(--text3);}
.gi:focus{background:rgba(255,255,255,0.16);border-color:var(--accent);}
.go{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--accent);border:none;border-radius:9px;width:34px;height:34px;cursor:pointer;color:#fff;font-size:19px;display:flex;align-items:center;justify-content:center;transition:opacity 0.15s,transform 0.15s;}
.go:hover{opacity:0.82;transform:translateY(-50%) scale(1.06);}
.geo-btn{width:100%;background:rgba(255,255,255,0.08);border:1px solid var(--glass-border);border-radius:var(--radius-sm);padding:13px 16px;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:15px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background 0.2s;}
.geo-btn:hover{background:rgba(255,255,255,0.16);color:var(--text);}
.divider{border:none;border-top:1px solid var(--glass-border);margin:20px 0;}
.saved-pills{display:flex;flex-wrap:wrap;gap:7px;}
.saved-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.1);border:1px solid var(--glass-border);border-radius:20px;padding:6px 12px;font-size:13px;cursor:pointer;transition:background 0.2s;}
.saved-pill:hover{background:rgba(255,255,255,0.2);}
.sp-x{color:var(--text3);font-size:11px;margin-left:2px;}
#land-err{font-size:13px;color:var(--red);margin-top:8px;min-height:18px;}
.theme-row{display:flex;gap:7px;margin-top:4px;}
.th-dot{flex:1;height:38px;border-radius:10px;border:2px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-size:11px;font-weight:800;color:#fff;letter-spacing:0.05em;transition:border-color 0.2s,transform 0.15s;}
.th-dot:hover{transform:scale(1.04);}
.th-dot.active{border-color:white;}
.th-dot[data-t="storm"]{background:linear-gradient(135deg,#0b0e1c,#1a1040);}
.th-dot[data-t="sky"]{background:linear-gradient(135deg,#c7dcf7,#ddd6fe);color:#1e1b4b;}
.th-dot[data-t="sunset"]{background:linear-gradient(135deg,#1a0430,#c2410c);}

/* MAIN SHELL */
#shell{display:none;min-height:100vh;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;padding:11px 16px;background:rgba(0,0,0,0.18);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-bottom:1px solid var(--glass-border);}
[data-ui="sky"] .topbar{background:rgba(255,255,255,0.3);}
.tb-logo{font-family:'Outfit',sans-serif;font-weight:900;font-size:17px;letter-spacing:-0.5px;flex-shrink:0;}
.loc-chip{flex:1;min-width:0;display:flex;align-items:center;gap:6px;background:var(--glass);border:1px solid var(--glass-border);border-radius:20px;padding:7px 12px;cursor:pointer;font-size:13px;transition:background 0.2s;overflow:hidden;}
.loc-chip:hover{background:var(--glass-hover);}
.loc-chip-txt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.tb-btn{background:var(--glass);border:1px solid var(--glass-border);border-radius:10px;width:36px;height:36px;cursor:pointer;color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s;}
.tb-btn:hover{background:var(--glass-hover);}
.tb-btn.spin{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* DESKTOP LAYOUT */
.layout{display:flex;max-width:1080px;margin:0 auto;padding:20px 16px 110px;gap:20px;}
.sidebar{width:260px;flex-shrink:0;position:sticky;top:72px;height:fit-content;display:none;}
.main-col{flex:1;min-width:0;max-width:600px;}
@media(min-width:780px){
  .sidebar{display:block;}
  .bottom-nav{display:none!important;}
  .layout{padding-bottom:40px;}
}

/* SIDEBAR NAV */
.side-nav{padding:8px;}
.sn-btn{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;background:none;border:none;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;width:100%;text-align:left;transition:background 0.2s,color 0.2s;}
.sn-btn:hover{background:var(--glass);color:var(--text);}
.sn-btn.active{background:var(--glass-strong);color:var(--text);font-weight:500;}
.sn-ico{font-size:17px;width:20px;text-align:center;}
.sn-div{height:1px;background:var(--glass-border);margin:6px 0;}
.sb-meter{margin-top:12px;padding:16px;}
.sbm-lbl{font-family:'Outfit',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.sbm-score{font-family:'Outfit',sans-serif;font-size:44px;font-weight:900;letter-spacing:-2px;line-height:1;}
.sbm-track{height:5px;border-radius:3px;background:rgba(255,255,255,0.12);margin-top:8px;overflow:hidden;}
.sbm-fill{height:100%;border-radius:3px;transition:width 1s,background-color 0.5s;}
.sbm-vibe{font-size:12px;color:var(--text2);margin-top:6px;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;display:flex;z-index:100;background:rgba(0,0,0,0.28);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-top:1px solid var(--glass-border);padding:8px 0 env(safe-area-inset-bottom,8px);}
[data-ui="sky"] .bottom-nav{background:rgba(255,255,255,0.35);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 0;background:none;border:none;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:10px;cursor:pointer;transition:color 0.2s;}
.nav-btn.active{color:var(--text);}
.nav-ico{font-size:20px;line-height:1;}
.nav-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:0;transition:opacity 0.2s;margin:1px auto 0;}
.nav-btn.active .nav-dot{opacity:1;}

/* SCREENS */
.screen{display:none;}.screen.active{display:block;}

/* HOME */
.bm-card{padding:22px 20px 20px;margin-bottom:12px;}
.bm-top{display:flex;align-items:flex-start;justify-content:space-between;}
.bm-lbl-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.bm-lbl{font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);}
.bm-refresh{background:none;border:none;cursor:pointer;color:var(--text3);font-size:17px;line-height:1;transition:color 0.2s;padding:0;}
.bm-refresh:hover{color:var(--text);}
.bm-score{font-family:'Outfit',sans-serif;font-size:90px;font-weight:900;letter-spacing:-5px;line-height:1;}
.bm-pct{font-size:40px;font-weight:300;opacity:0.5;}
.bm-vibe{font-family:'Outfit',sans-serif;font-size:16px;font-weight:800;}
.bm-track{height:6px;border-radius:3px;background:rgba(255,255,255,0.12);overflow:hidden;margin-top:14px;}
.bm-fill{height:100%;border-radius:3px;transition:width 1.2s cubic-bezier(0.4,0,0.2,1),background-color 0.5s;}
.bm-summary{font-size:13px;color:var(--text2);margin-top:10px;line-height:1.6;}

.out-card{padding:18px 20px;margin-bottom:12px;}
.out-q{font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.out-verdict{font-family:'Outfit',sans-serif;font-size:34px;font-weight:900;letter-spacing:-1px;line-height:1;}
.out-reason{font-size:13px;color:var(--text2);margin-top:5px;}

.chips-hdr{display:flex;align-items:center;justify-content:space-between;margin:8px 0 10px;}
.chips-lbl{font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);}
.show-btn{font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:2px;}
.chips-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
@media(min-width:480px){.chips-grid{grid-template-columns:1fr 1fr 1fr;}}

.chip{padding:15px 13px;cursor:pointer;position:relative;transition:background 0.2s,transform 0.15s;}
.chip:hover{background:var(--glass-hover)!important;transform:translateY(-2px);}
.chip:active{transform:scale(0.97);}
.chip-dot{position:absolute;top:11px;right:11px;width:7px;height:7px;border-radius:50%;}
.chip-dot.ok{background:var(--green);} .chip-dot.warn{background:var(--yellow);} .chip-dot.danger{background:var(--red);} .chip-dot.none{background:var(--text3);opacity:0.35;}
.chip-ico{font-size:22px;margin-bottom:7px;line-height:1;}
.chip-lbl{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);font-family:'Outfit',sans-serif;margin-bottom:3px;}
.chip-val{font-family:'Outfit',sans-serif;font-size:19px;font-weight:800;letter-spacing:-0.5px;line-height:1.1;}
.chip-sub{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.4;}

/* DRAWER */
.drawer{display:none;position:fixed;inset:0;z-index:300;align-items:flex-end;justify-content:center;}
.drawer.open{display:flex;}
.drawer-bg{position:absolute;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);}
.drawer-sheet{position:relative;z-index:1;width:100%;max-width:500px;background:var(--bg-a,#0b0e1c);border:1px solid var(--glass-border);border-radius:24px 24px 0 0;padding:20px 24px 52px;animation:slideUp 0.28s cubic-bezier(0.4,0,0.2,1);}
[data-ui="sky"] .drawer-sheet{background:#d8e8fc;}
[data-ui="sunset"] .drawer-sheet{background:#1a0430;}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.drawer-handle{width:36px;height:4px;border-radius:2px;background:var(--glass-border);margin:0 auto 20px;}
.drawer-close{position:absolute;top:16px;right:18px;background:var(--glass);border:1px solid var(--glass-border);border-radius:50%;width:30px;height:30px;cursor:pointer;color:var(--text2);font-size:15px;display:flex;align-items:center;justify-content:center;}
.d-ico{font-size:42px;margin-bottom:8px;}
.d-lbl-text{font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);}
.d-val-text{font-family:'Outfit',sans-serif;font-size:52px;font-weight:900;letter-spacing:-2px;line-height:1;margin:6px 0 10px;}
.d-body{font-size:16px;color:var(--text2);line-height:1.65;}

/* WARNINGS */
.alert-card{padding:20px;margin-bottom:11px;}
.al-badge{display:inline-flex;align-items:center;gap:5px;border-radius:6px;padding:4px 10px;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;font-family:'Outfit',sans-serif;margin-bottom:10px;}
.badge-watch{background:rgba(251,191,36,0.18);color:var(--yellow);border:1px solid rgba(251,191,36,0.3);}
.badge-warning{background:rgba(248,113,113,0.18);color:var(--red);border:1px solid rgba(248,113,113,0.3);}
.badge-advisory{background:rgba(147,197,253,0.18);color:#93c5fd;border:1px solid rgba(147,197,253,0.3);}
.al-title{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;letter-spacing:-0.3px;margin-bottom:8px;}
.al-body{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:8px;}
.al-time{font-size:12px;color:var(--text3);}
.al-expand{background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:underline;margin-top:6px;display:block;}
.al-raw{display:none;font-size:12px;color:var(--text3);line-height:1.7;margin-top:10px;border-top:1px solid var(--glass-border);padding-top:10px;}
.al-raw.open{display:block;}
.all-clear{text-align:center;padding:70px 20px;}
.ac-icon{font-size:60px;margin-bottom:12px;}
.ac-title{font-family:'Outfit',sans-serif;font-size:26px;font-weight:900;margin-bottom:6px;}
.ac-sub{font-size:14px;color:var(--text2);}

/* HOURLY */
.hr-row{display:flex;align-items:center;gap:12px;padding:13px 15px;margin-bottom:8px;border-radius:var(--radius-sm);background:var(--glass);border:1px solid var(--glass-border);transition:background 0.2s;}
.hr-row:hover{background:var(--glass-hover);}
.hr-row.hl{border-color:rgba(248,113,113,0.45);background:rgba(248,113,113,0.09);}
.hr-time{font-family:'Outfit',sans-serif;font-weight:700;font-size:13px;width:50px;min-width:50px;color:var(--text2);}
.hr-ico{font-size:20px;width:24px;text-align:center;}
.hr-temp{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;letter-spacing:-0.5px;width:60px;}
.hr-tags{flex:1;display:flex;flex-wrap:wrap;gap:5px;}
.hr-tag{font-size:11px;background:rgba(255,255,255,0.09);border-radius:6px;padding:3px 8px;color:var(--text2);}
.hr-alert{font-size:12px;font-weight:700;color:var(--red);font-family:'Outfit',sans-serif;}

/* FUTURE */
.f-tabs{display:flex;gap:5px;margin-bottom:14px;background:rgba(0,0,0,0.18);border-radius:14px;padding:4px;}
[data-ui="sky"] .f-tabs{background:rgba(255,255,255,0.3);}
.ftab{flex:1;padding:9px 6px;background:none;border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text3);cursor:pointer;transition:background 0.2s,color 0.2s;}
.ftab.active{background:var(--glass-strong);color:var(--text);}
.fpanel{display:none;}.fpanel.active{display:block;}

.week-hero{padding:22px;margin-bottom:12px;}
.wk-line{font-family:'Outfit',sans-serif;font-size:21px;font-weight:800;letter-spacing:-0.5px;line-height:1.3;margin-bottom:12px;}
.wk-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.wk-chip{font-size:12px;font-weight:700;font-family:'Outfit',sans-serif;border-radius:20px;padding:5px 11px;}
.wkc-best{background:rgba(74,222,128,0.18);color:var(--green);border:1px solid rgba(74,222,128,0.28);}
.wkc-worst{background:rgba(248,113,113,0.18);color:var(--red);border:1px solid rgba(248,113,113,0.28);}
.wkc-warn{background:rgba(251,191,36,0.18);color:var(--yellow);border:1px solid rgba(251,191,36,0.28);}
.wkc-info{background:rgba(255,255,255,0.09);color:var(--text2);border:1px solid var(--glass-border);}
.wk-impact{font-size:13px;color:var(--text2);line-height:1.6;}

.day-row{display:flex;align-items:center;gap:12px;padding:14px 16px;margin-bottom:8px;border-radius:var(--radius-sm);background:var(--glass);border:1px solid var(--glass-border);}
.dr-name{font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;width:36px;min-width:36px;}
.dr-ico{font-size:20px;width:24px;text-align:center;}
.dr-bar{flex:1;}
.dr-temps{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;}
.dr-hi{font-family:'Outfit',sans-serif;font-weight:800;} .dr-lo{color:var(--text3);}
.dr-track{height:4px;border-radius:2px;background:rgba(255,255,255,0.12);}
.dr-fill{height:100%;border-radius:2px;background:rgba(255,255,255,0.45);}
.dr-note{font-size:11px;color:var(--text2);margin-top:4px;}
.dr-prec{font-family:'Outfit',sans-serif;font-weight:700;font-size:13px;width:34px;text-align:right;min-width:34px;}

/* GRAPHS */
.graph-card{padding:18px;margin-bottom:12px;}
.gc-title{font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;}
.gc-legend{display:inline-flex;gap:6px;margin-left:8px;}
.gc-dot{font-size:11px;font-weight:600;font-family:'Outfit',sans-serif;padding:2px 7px;border-radius:5px;}
.gc-safe{background:rgba(74,222,128,0.18);color:var(--green);}
.gc-watch{background:rgba(251,191,36,0.18);color:var(--yellow);}
.gc-bad{background:rgba(248,113,113,0.18);color:var(--red);}

/* FULL TAB */
.full-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px;}
@media(min-width:480px){.full-grid{grid-template-columns:1fr 1fr 1fr;}}
.fs-card{padding:14px 13px;}
.fs-lbl{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);font-family:'Outfit',sans-serif;margin-bottom:4px;}
.fs-val{font-family:'Outfit',sans-serif;font-size:21px;font-weight:800;letter-spacing:-0.5px;line-height:1.1;}
.fs-int{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.4;}
.nws-card{padding:16px;margin-bottom:12px;font-size:13px;color:var(--text2);line-height:1.7;}

/* SETTINGS */
.stg-group{margin-bottom:20px;}
.stg-title{font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;}
.stg-row{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;margin-bottom:7px;border-radius:var(--radius-sm);background:var(--glass);border:1px solid var(--glass-border);}
.sr-lbl{font-size:14px;font-weight:500;}
.sr-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.toggle{width:46px;height:27px;border-radius:14px;background:rgba(255,255,255,0.14);border:none;cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0;}
.toggle.on{background:var(--accent);}
.toggle::after{content:'';position:absolute;top:4px;left:4px;width:19px;height:19px;border-radius:50%;background:#fff;transition:transform 0.2s;}
.toggle.on::after{transform:translateX(19px);}
.seg{display:flex;background:rgba(255,255,255,0.09);border-radius:9px;padding:3px;gap:2px;}
.seg-b{flex:1;padding:6px 10px;background:none;border:none;border-radius:7px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;color:var(--text3);cursor:pointer;transition:background 0.2s,color 0.2s;white-space:nowrap;}
.seg-b.active{background:var(--glass-strong);color:var(--text);}

.tone-cards{display:flex;gap:8px;}
.tc{flex:1;min-width:0;padding:14px 10px;border-radius:14px;background:var(--glass);border:1px solid var(--glass-border);cursor:pointer;text-align:center;transition:background 0.2s,border-color 0.2s;}
.tc:hover{background:var(--glass-hover);}
.tc.active{border-color:var(--accent);}
.tc-ico{font-size:26px;margin-bottom:6px;}
.tc-name{font-family:'Outfit',sans-serif;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.04em;}
.tc-desc{font-size:10px;color:var(--text2);margin-top:3px;line-height:1.3;}

.ui-cards{display:flex;gap:8px;}
.ui-card{flex:1;height:58px;border-radius:13px;cursor:pointer;border:2px solid transparent;transition:border-color 0.2s,transform 0.15s;display:flex;align-items:flex-end;padding:7px 9px;overflow:hidden;}
.ui-card:hover{transform:scale(1.04);}
.ui-card.active{border-color:white;}
.ui-card[data-t="storm"]{background:linear-gradient(135deg,#0b0e1c,#1a1040,#818cf8 200%);}
.ui-card[data-t="sky"]{background:linear-gradient(135deg,#c7dcf7,#ddd6fe,#4f46e5 220%);}
.ui-card[data-t="sunset"]{background:linear-gradient(135deg,#1a0430,#7c1d6f,#fb923c 190%);}
.ui-name{font-family:'Outfit',sans-serif;font-size:11px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.5);letter-spacing:0.05em;}
[data-t="sky"] .ui-name{color:#1e1b4b;text-shadow:none;}

.about-box{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius-sm);padding:15px;font-size:13px;color:var(--text2);line-height:1.7;}

/* LOC MODAL */
.lm{display:none;position:fixed;inset:0;z-index:200;align-items:flex-end;justify-content:center;}
.lm.open{display:flex;}
.lm-bg{position:absolute;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);}
.lm-sheet{position:relative;z-index:1;width:100%;max-width:460px;background:var(--bg-a,#0b0e1c);border:1px solid var(--glass-border);border-radius:24px 24px 0 0;padding:18px 22px 52px;animation:slideUp 0.28s cubic-bezier(0.4,0,0.2,1);}
[data-ui="sky"] .lm-sheet{background:#c7dcf7;}
[data-ui="sunset"] .lm-sheet{background:#1a0430;}
.lm-handle{width:36px;height:4px;border-radius:2px;background:var(--glass-border);margin:0 auto 18px;}
.lm-title{font-family:'Outfit',sans-serif;font-size:20px;font-weight:900;margin-bottom:14px;}

/* UTIL */
.sec-lbl{font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin:16px 0 9px;}
.foot{text-align:center;font-size:11px;color:var(--text3);padding:22px 0 8px;}
.fade-in{animation:fadein 0.35s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(7px)}}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:18px;}
.ld-dots{display:flex;gap:8px;}
.ld-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);animation:bdot 1.2s infinite;}
.ld-dot:nth-child(2){animation-delay:0.2s;}.ld-dot:nth-child(3){animation-delay:0.4s;}
@keyframes bdot{0%,80%,100%{transform:scale(0.8);opacity:0.4}40%{transform:scale(1.2);opacity:1}}
.ld-txt{font-family:'Outfit',sans-serif;font-size:14px;color:var(--text3);}
.err-box{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.28);border-radius:var(--radius);padding:22px;text-align:center;}
.err-title{font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:var(--red);margin-bottom:7px;}
.err-body{font-size:13px;color:var(--text2);}
.hidden{display:none!important;}
</style>
</head>
<body data-ui="storm">
<div class="bg"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
<div id="app">

<!-- LANDING -->
<div id="landing">
  <div class="land-card">
    <div class="land-logo">TERSE.</div>
    <div class="land-tag">Weather. No fluff.</div>

    <div id="ls-saved" class="hidden">
      <div class="land-lbl">Jump back in</div>
      <div class="saved-pills" id="ls-pills"></div>
      <hr class="divider">
    </div>

    <div class="land-lbl">Your location</div>
    <div class="inp-wrap">
      <input class="gi" id="l-zip" type="text" placeholder="ZIP code (e.g. 64772)" inputmode="numeric" maxlength="10">
      <button class="go" onclick="doZip()">→</button>
    </div>
    <div class="inp-wrap">
      <input class="gi" id="l-city" type="text" placeholder="City name (e.g. Mexico, MO)">
      <button class="go" onclick="doCity()">→</button>
    </div>
    <button class="geo-btn" onclick="doGeo('land-err')"><span>📍</span><span>Use my location</span></button>
    <div id="land-err"></div>

    <hr class="divider">
    <div class="land-lbl">Theme</div>
    <div class="theme-row">
      <div class="th-dot active" data-t="storm" onclick="setUI('storm')">⛈ Storm</div>
      <div class="th-dot" data-t="sky" onclick="setUI('sky')">🌤 Sky</div>
      <div class="th-dot" data-t="sunset" onclick="setUI('sunset')">🌅 Sunset</div>
    </div>
  </div>
</div>

<!-- MAIN SHELL -->
<div id="shell">
  <div class="topbar">
    <div class="tb-logo">TERSE.</div>
    <div class="loc-chip" onclick="openLM()">
      <span>📍</span>
      <span class="loc-chip-txt" id="loc-txt">—</span>
      <span style="color:var(--text3);font-size:11px">▾</span>
    </div>
    <button class="tb-btn" id="refresh-btn" onclick="doRefresh()" title="Refresh">↻</button>
    <button class="tb-btn" onclick="switchTab('settings')" title="Settings">⚙️</button>
  </div>

  <div class="layout">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="glass side-nav">
        <button class="sn-btn active" id="sn-home" onclick="switchTab('home')"><span class="sn-ico">🏠</span>Now</button>
        <button class="sn-btn" id="sn-warnings" onclick="switchTab('warnings')"><span class="sn-ico">⚠️</span>Alerts</button>
        <button class="sn-btn" id="sn-hourly" onclick="switchTab('hourly')"><span class="sn-ico">🕐</span>Hourly</button>
        <button class="sn-btn" id="sn-future" onclick="switchTab('future')"><span class="sn-ico">📅</span>Future</button>
        <div class="sn-div"></div>
        <button class="sn-btn" id="sn-settings" onclick="switchTab('settings')"><span class="sn-ico">⚙️</span>Settings</button>
      </div>
      <div class="glass sb-meter" id="sb-meter" style="display:none">
        <div class="sbm-lbl">⚠️ Bad Meter</div>
        <div class="sbm-score" id="sb-score">—</div>
        <div class="sbm-track"><div class="sbm-fill" id="sb-fill" style="width:0%"></div></div>
        <div class="sbm-vibe" id="sb-vibe">Loading...</div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main-col">
      <div id="screen-home" class="screen active"><div id="home-inner"><div class="loading"><div class="ld-dots"><div class="ld-dot"></div><div class="ld-dot"></div><div class="ld-dot"></div></div><div class="ld-txt">Checking the vibes...</div></div></div></div>
      <div id="screen-warnings" class="screen"><div id="warn-inner"><div class="loading"><div class="ld-dots"><div class="ld-dot"></div><div class="ld-dot"></div><div class="ld-dot"></div></div><div class="ld-txt">Scanning for chaos...</div></div></div></div>
      <div id="screen-hourly" class="screen"><div id="hour-inner"><div class="loading"><div class="ld-dots"><div class="ld-dot"></div><div class="ld-dot"></div><div class="ld-dot"></div></div><div class="ld-txt">Hour by hour...</div></div></div></div>
      <div id="screen-future" class="screen">
        <div class="f-tabs">
          <button class="ftab active" onclick="setFTab('summary')">What's Coming</button>
          <button class="ftab" onclick="setFTab('graph')">See It</button>
          <button class="ftab" onclick="setFTab('full')">Everything</button>
        </div>
        <div id="fp-summary" class="fpanel active"></div>
        <div id="fp-graph" class="fpanel"></div>
        <div id="fp-full" class="fpanel"></div>
      </div>
      <div id="screen-settings" class="screen"><div class="fade-in" id="stg-inner"></div></div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="switchTab('home')"><div class="nav-ico">🏠</div><div>Now</div><div class="nav-dot"></div></button>
    <button class="nav-btn" id="nav-warnings" onclick="switchTab('warnings')"><div class="nav-ico">⚠️</div><div>Alerts</div><div class="nav-dot"></div></button>
    <button class="nav-btn" id="nav-hourly" onclick="switchTab('hourly')"><div class="nav-ico">🕐</div><div>Hourly</div><div class="nav-dot"></div></button>
    <button class="nav-btn" id="nav-future" onclick="switchTab('future')"><div class="nav-ico">📅</div><div>Future</div><div class="nav-dot"></div></button>
    <button class="nav-btn" id="nav-settings" onclick="switchTab('settings')"><div class="nav-ico">⚙️</div><div>Settings</div><div class="nav-dot"></div></button>
  </nav>
</div>

<!-- CHIP DRAWER -->
<div class="drawer" id="drawer" onclick="closeDrawer()">
  <div class="drawer-bg"></div>
  <div class="drawer-sheet" onclick="event.stopPropagation()">
    <div class="drawer-handle"></div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
    <div class="d-ico" id="d-ico"></div>
    <div class="d-lbl-text" id="d-lbl"></div>
    <div class="d-val-text" id="d-val"></div>
    <div class="d-body" id="d-body"></div>
  </div>
</div>

<!-- LOCATION MODAL -->
<div class="lm" id="lm" onclick="closeLM()">
  <div class="lm-bg"></div>
  <div class="lm-sheet" onclick="event.stopPropagation()">
    <div class="lm-handle"></div>
    <div class="lm-title">Switch Location</div>
    <div class="inp-wrap"><input class="gi" id="m-zip" type="text" placeholder="ZIP code" inputmode="numeric" maxlength="10"><button class="go" onclick="mZip()">→</button></div>
    <div class="inp-wrap" style="margin-top:8px"><input class="gi" id="m-city" type="text" placeholder="City name"><button class="go" onclick="mCity()">→</button></div>
    <button class="geo-btn" style="margin-top:8px" onclick="mGeo()"><span>📍</span><span>Use my location</span></button>
    <div class="saved-pills" id="m-pills" style="margin-top:14px"></div>
  </div>
</div>

</div><!-- /app -->
<script>
// ─── STATE ───────────────────────────────────────────────────
const S = {
  lat:null,lon:null,name:'',
  ui:'storm',tone:'terse',units:'F',
  saved:[],showHidden:false,
  notifs:false,dailyNotif:false,
  gridId:null,gridX:null,gridY:null,zone:null,
  forecast:null,hourly:null,alerts:null,gridRaw:null,
  loaded:false,
};
function load(){try{const d=JSON.parse(localStorage.getItem('tw3')||'{}');['lat','lon','name','ui','tone','units','saved','notifs','dailyNotif','gridId','gridX','gridY','zone'].forEach(k=>{if(d[k]!==undefined)S[k]=d[k];});}catch(e){}}
function save(){localStorage.setItem('tw3',JSON.stringify({lat:S.lat,lon:S.lon,name:S.name,ui:S.ui,tone:S.tone,units:S.units,saved:S.saved,notifs:S.notifs,dailyNotif:S.dailyNotif,gridId:S.gridId,gridX:S.gridX,gridY:S.gridY,zone:S.zone}));}
load();

// ─── BOOT ────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  applyUI(S.ui);
  renderLSaved();
  ['l-zip','l-city'].forEach(id=>{
    document.getElementById(id)?.addEventListener('keydown',e=>{if(e.key==='Enter'){id==='l-zip'?doZip():doCity();}});
  });
  ['m-zip','m-city'].forEach(id=>{
    document.getElementById(id)?.addEventListener('keydown',e=>{if(e.key==='Enter'){id==='m-zip'?mZip():mCity();}});
  });
  if(S.lat&&S.lon&&S.name) enterApp(S.lat,S.lon,S.name,false);
});

// ─── UI THEME ────────────────────────────────────────────────
function setUI(t){S.ui=t;applyUI(t);save();}
function applyUI(t){
  document.body.setAttribute('data-ui',t);
  document.querySelectorAll('[data-t]').forEach(el=>el.classList.toggle('active',el.dataset.t===t));
}

// ─── TONE ────────────────────────────────────────────────────
function setTone(t){S.tone=t;document.querySelectorAll('[data-tone]').forEach(el=>el.classList.toggle('active',el.dataset.tone===t));save();if(S.loaded)renderAll();}

// ─── UNITS ───────────────────────────────────────────────────
function setUnits(u){S.units=u;['F','C'].forEach(x=>document.getElementById('u-'+x)?.classList.toggle('active',x===u));save();if(S.loaded)renderAll();}
function fmt(f){return S.units==='C'?Math.round((f-32)*5/9)+'°C':Math.round(f)+'°F';}

// ─── NAV ─────────────────────────────────────────────────────
const TABS=['home','warnings','hourly','future','settings'];
function switchTab(t){
  TABS.forEach(x=>{
    document.getElementById('screen-'+x)?.classList.toggle('active',x===t);
    document.getElementById('nav-'+x)?.classList.toggle('active',x===t);
    document.getElementById('sn-'+x)?.classList.toggle('active',x===t);
  });
  if(t==='settings')buildSettings();
  if(t==='future'){const gp=document.getElementById('fp-graph');if(gp?.classList.contains('active')&&S.loaded)renderGraphs();}
}
function setFTab(t){
  const ts=['summary','graph','full'];
  document.querySelectorAll('.ftab').forEach((b,i)=>b.classList.toggle('active',ts[i]===t));
  document.querySelectorAll('.fpanel').forEach(p=>p.classList.remove('active'));
  document.getElementById('fp-'+t)?.classList.add('active');
  if(t==='graph'&&S.loaded)renderGraphs();
}

// ─── SAVED LOCATIONS ─────────────────────────────────────────
function renderLSaved(){
  const sec=document.getElementById('ls-saved'),list=document.getElementById('ls-pills');
  if(!sec||!list)return;
  if(!S.saved.length){sec.classList.add('hidden');return;}
  sec.classList.remove('hidden');
  list.innerHTML=S.saved.map((s,i)=>`<div class="saved-pill" onclick="quickLoad(${i})"><span>📍</span><span>${s.name}</span><span class="sp-x" onclick="event.stopPropagation();rmSaved(${i})">✕</span></div>`).join('');
}
function renderMSaved(){
  const el=document.getElementById('m-pills');if(!el)return;
  el.innerHTML=S.saved.map((s,i)=>`<div class="saved-pill" onclick="quickLoad(${i});closeLM()"><span>📍</span><span>${s.name}</span><span class="sp-x" onclick="event.stopPropagation();rmSaved(${i})">✕</span></div>`).join('');
}
function rmSaved(i){S.saved.splice(i,1);save();renderLSaved();renderMSaved();buildSettings();}
function quickLoad(i){const s=S.saved[i];if(s)enterApp(s.lat,s.lon,s.name,false);}
function saveCurrentLoc(){
  if(!S.lat||!S.name)return;
  if(!S.saved.find(x=>x.name===S.name)){S.saved.push({lat:S.lat,lon:S.lon,name:S.name});save();renderLSaved();renderMSaved();buildSettings();}
}

// ─── GEOCODE ─────────────────────────────────────────────────
async function doZip(){const z=document.getElementById('l-zip')?.value.trim();if(z)await geocode(z+', USA','land-err');}
async function doCity(){const c=document.getElementById('l-city')?.value.trim();if(c)await geocode(c,'land-err');}
async function mZip(){const z=document.getElementById('m-zip')?.value.trim();if(z){closeLM();await geocode(z+', USA',null);}}
async function mCity(){const c=document.getElementById('m-city')?.value.trim();if(c){closeLM();await geocode(c,null);}}
async function mGeo(){closeLM();await doGeo(null);}

// Clean Nominatim address → "City, ST" always
function cleanLocName(addr){
  // Pick the most specific populated place name
  const city=addr?.city||addr?.town||addr?.village||addr?.hamlet||addr?.suburb||addr?.neighbourhood||addr?.county||'';
  const state=addr?.state_code||'';
  if(city&&state)return`${city}, ${state}`;
  if(city)return city;
  return'Your Location';
}
async function geocode(q,errId){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&countrycodes=us&addressdetails=1`,{headers:{'Accept-Language':'en'}});
    const d=await r.json();
    if(!d.length)throw new Error('Location not found. Try a different search.');
    const name=cleanLocName(d[0].address);
    await enterApp(parseFloat(d[0].lat),parseFloat(d[0].lon),name,false);
  }catch(e){setErr(errId,e.message);}
}
async function doGeo(errId){
  if(!navigator.geolocation){setErr(errId,'Geolocation not supported.');return;}
  return new Promise(res=>{
    navigator.geolocation.getCurrentPosition(async pos=>{
      const{latitude:lat,longitude:lon}=pos.coords;
      try{
        const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
        const d=await r.json();
        await enterApp(lat,lon,cleanLocName(d.address),false);
      }catch{await enterApp(lat,lon,'Your Location',false);}
      res();
    },()=>{setErr(errId,'Could not get location.');res();});
  });
}
function setErr(id,msg){if(!id)return;const el=document.getElementById(id);if(el)el.textContent=msg;}

// ─── ENTER APP ───────────────────────────────────────────────
async function enterApp(lat,lon,name,skipFetch){
  S.lat=lat;S.lon=lon;S.name=name;
  document.getElementById('landing').style.display='none';
  document.getElementById('shell').style.display='block';
  document.getElementById('loc-txt').textContent=name;
  save();
  setAllLoading();
  await fetchWeather();
}
function setAllLoading(){
  const l=`<div class="loading"><div class="ld-dots"><div class="ld-dot"></div><div class="ld-dot"></div><div class="ld-dot"></div></div><div class="ld-txt">Fetching the vibes...</div></div>`;
  ['home-inner','warn-inner','hour-inner','fp-summary','fp-full'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=l;});
}
async function fetchWeather(){
  try{
    const pt=await fetch(`https://api.weather.gov/points/${S.lat.toFixed(4)},${S.lon.toFixed(4)}`,{headers:{'User-Agent':'TerseWeather/2.0'}});
    if(!pt.ok)throw new Error('NWS cannot find this location. NWS only covers the US — try a different city.');
    const p=(await pt.json()).properties;
    S.gridId=p.gridId;S.gridX=p.gridX;S.gridY=p.gridY;
    S.zone=p.forecastZone?.split('/').pop()||p.county?.split('/').pop();
    const[fc,hr,al,gr]=await Promise.allSettled([
      fetch(`https://api.weather.gov/gridpoints/${S.gridId}/${S.gridX},${S.gridY}/forecast`,{headers:{'User-Agent':'TerseWeather/2.0'}}),
      fetch(`https://api.weather.gov/gridpoints/${S.gridId}/${S.gridX},${S.gridY}/forecast/hourly`,{headers:{'User-Agent':'TerseWeather/2.0'}}),
      S.zone?fetch(`https://api.weather.gov/alerts/active?zone=${S.zone}`,{headers:{'User-Agent':'TerseWeather/2.0'}}):Promise.resolve(null),
      fetch(`https://api.weather.gov/gridpoints/${S.gridId}/${S.gridX},${S.gridY}`,{headers:{'User-Agent':'TerseWeather/2.0'}}),
    ]);
    if(fc.status==='fulfilled'&&fc.value.ok)S.forecast=(await fc.value.json()).properties;
    if(hr.status==='fulfilled'&&hr.value.ok)S.hourly=(await hr.value.json()).properties;
    S.alerts=al.status==='fulfilled'&&al.value?.ok?(await al.value.json()).features||[]:[];
    if(gr.status==='fulfilled'&&gr.value.ok)S.gridRaw=(await gr.value.json()).properties;
    S.loaded=true;
    renderAll();
  }catch(e){
    document.getElementById('home-inner').innerHTML=`<div class="err-box"><div class="err-title">Couldn't load weather</div><div class="err-body">${e.message}</div></div>`;
  }
}
async function doRefresh(){
  if(!S.lat)return;
  const btn=document.getElementById('refresh-btn');
  if(btn)btn.classList.add('spin');
  S.loaded=false;
  await fetchWeather();
  if(btn)btn.classList.remove('spin');
}

// ─── HELPERS ─────────────────────────────────────────────────
function getCur(){return S.hourly?.periods?.[0]||S.forecast?.periods?.[0]||null;}
function getDay(){return S.forecast?.periods?.find(p=>p.isDaytime!==false)||S.forecast?.periods?.[0]||null;}
function tF(p){if(!p)return 70;return p.temperatureUnit==='F'?p.temperature:p.temperature*9/5+32;}
function wSpd(p){if(!p?.windSpeed)return 0;const m=p.windSpeed.match(/(\d+)/g);return m?Math.max(...m.map(Number)):0;}
function prec(p){return p?.probabilityOfPrecipitation?.value||0;}
function hum(p){return p?.relativeHumidity?.value??null;}
function sh(p){return p?.shortForecast||'';}
function wIco(s){
  const f=(s||'').toLowerCase();
  if(f.includes('tornado'))return'🌪️';
  if(f.includes('thunder')||f.includes('t-storm'))return'⛈️';
  if(f.includes('blizzard'))return'🌨️';
  if(f.includes('heavy snow'))return'❄️';
  if(f.includes('snow')||f.includes('flurr'))return'🌨️';
  if(f.includes('sleet')||f.includes('ice pellet'))return'🧊';
  if(f.includes('freezing'))return'🧊';
  if(f.includes('heavy rain')||f.includes('heavy shower'))return'🌧️';
  if(f.includes('rain')||f.includes('shower'))return'🌦️';
  if(f.includes('drizzle'))return'🌦️';
  if(f.includes('fog'))return'🌫️';
  if(f.includes('wind')||f.includes('breez'))return'💨';
  if(f.includes('sunny')||f.includes('clear'))return'☀️';

}

// ─── BAD METER ───────────────────────────────────────────────
// Detects if it's actively raining/storming RIGHT NOW from hourly[0]
function isActivelyBad(){
  const p=S.hourly?.periods?.[0];
  if(!p)return{rain:false,storm:false,snow:false};
  const sf=sh(p).toLowerCase();
  const rain=sf.includes('rain')||sf.includes('shower')||sf.includes('drizzle')||sf.includes('precipitation');
  const storm=sf.includes('thunder')||sf.includes('tornado')||sf.includes('t-storm');
  const snow=sf.includes('snow')||sf.includes('sleet')||sf.includes('blizzard')||sf.includes('ice pellet');
  return{rain,storm,snow};
}
function calcBad(){
  let s=0;
  // Alerts are the biggest driver — only one alert at a time counts (take the worst)
  const alertScores=(S.alerts||[]).map(a=>{
    const e=(a.properties?.event||'').toLowerCase();
    if(e.includes('tornado warning'))return 80;
    if(e.includes('tornado watch'))return 45;
    if(e.includes('severe thunderstorm warning'))return 55;
    if(e.includes('severe thunderstorm watch'))return 30;
    if(e.includes('flash flood warning'))return 50;
    if(e.includes('flood warning'))return 35;
    if(e.includes('blizzard warning'))return 45;
    if(e.includes('winter storm warning'))return 38;
    if(e.includes('ice storm warning'))return 42;
    if(e.includes('excessive heat warning'))return 30;
    if(e.includes('heat advisory'))return 18;
    if(e.includes('high wind warning'))return 22;
    if(e.includes('wind advisory'))return 12;
    if(e.includes('dense fog'))return 18;
    if(e.includes('watch'))return 20;
    if(e.includes('warning'))return 25;
    return 10;
  });
  // Add worst alert + half of second-worst (stacking alerts matters but not linearly)
  if(alertScores.length){
    alertScores.sort((a,b)=>b-a);
    s+=alertScores[0];
    if(alertScores[1])s+=Math.round(alertScores[1]*0.5);
    if(alertScores[2])s+=Math.round(alertScores[2]*0.25);
  }
  const p=getCur();
  if(p){
    const tf=tF(p),wf=wSpd(p),pf=prec(p),sf=sh(p).toLowerCase();
    // Temperature extremes
    if(tf>=105)s+=25;else if(tf>=100)s+=18;else if(tf>=95)s+=10;else if(tf>=90)s+=4;
    if(tf<=-10)s+=25;else if(tf<=0)s+=18;else if(tf<=10)s+=12;else if(tf<=20)s+=6;else if(tf<=32)s+=3;
    // Wind
    if(wf>=60)s+=25;else if(wf>=50)s+=18;else if(wf>=40)s+=12;else if(wf>=30)s+=7;else if(wf>=20)s+=3;
    // Precip chance
    if(pf>=90)s+=18;else if(pf>=70)s+=12;else if(pf>=50)s+=7;else if(pf>=30)s+=3;
    // Active conditions in shortForecast
    if(sf.includes('tornado'))s+=40;
    else if(sf.includes('thunder')||sf.includes('t-storm'))s+=18;
    if(sf.includes('heavy rain')||sf.includes('heavy shower'))s+=12;
    else if(sf.includes('rain')||sf.includes('shower')||sf.includes('drizzle'))s+=6;
    if(sf.includes('blizzard'))s+=25;
    else if(sf.includes('heavy snow'))s+=18;
    else if(sf.includes('snow')||sf.includes('sleet'))s+=10;
    else if(sf.includes('freezing'))s+=12;
    if(sf.includes('dense fog')||sf.includes('heavy fog'))s+=15;
    else if(sf.includes('fog'))s+=7;
    if(sf.includes('ice storm'))s+=22;
  }
  return Math.min(100,Math.round(s));
}
function badCol(s){if(s<=15)return'#4ade80';if(s<=35)return'#a3e635';if(s<=55)return'#fbbf24';if(s<=75)return'#fb923c';return'#f87171';}
function badLbl(s){if(s<=8)return'All clear';if(s<=20)return'Pretty calm';if(s<=35)return'Minor stuff';if(s<=50)return'Worth watching';if(s<=65)return'Getting dicey';if(s<=80)return'Not great';if(s<=92)return'Dangerous';return'TAKE SHELTER';}

    rL(p,s){if(p>=80)return`${p}% chance. It's going to rain. Accept it.`;if(p>=50)return`${p}% chance. Umbrella probably wise.`;if(p>=30)return`${p}% chance. Maybe bring one.`;return`${p}% chance. Probably fine.`;},
    wL(w){if(w>=50)return`${w} mph. Your umbrella will not survive this.`;if(w>=35)return`${w} mph. Genuinely windy. Hold your stuff.`;if(w>=20)return`${w} mph. Breezy. Hair day: cancelled.`;if(w>=10)return`${w} mph. A gentle breeze.`;return'Basically still out there.';},

function renderWarnings(){

  al.forEach((a,i)=>{
    const p=a.properties||{},ev=p.event||'Alert';
    const iw=ev.toLowerCase().includes('warning'),iwt=ev.toLowerCase().includes('watch');
    const bc=iw?'badge-warning':iwt?'badge-watch':'badge-advisory';
    const bl=iw?'⚠️ WARNING':iwt?'👀 WATCH':'ℹ️ ADVISORY';
    const on=p.onset?new Date(p.onset).toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):'';
    const ex=p.expires?new Date(p.expires).toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):'';
    h+=`<div class="glass alert-card">
      <div class="al-badge ${bc}">${bl}</div>
      <div class="al-title">${ev}</div>
      <div class="al-body">${xlateAlert(ev)}</div>
      ${on||ex?`<div class="al-time">${on?'Starts '+on:''}${on&&ex?' · ':''}${ex?'Expires '+ex:''}</div>`:''}
      ${p.description?`<button class="al-expand" onclick="toggleRaw(${i})">Read official text ▾</button><div class="al-raw" id="raw-${i}">${p.description.replace(/\n/g,'<br>')}</div>`:''}
    </div>`;
  });
  h+='</div>';
  document.getElementById('warn-inner').innerHTML=h;
}
function xlateAlert(evt){
  const e=evt.toLowerCase(),tn=S.tone;
  if(e.includes('tornado warning'))return tn==='unhinged'?'🌪️ THIS IS NOT A DRILL. GO TO SHELTER NOW. Interior room, lowest floor, away from windows. BRING A BLANKET. GO.':tn==='terse'?'A tornado has been confirmed nearby. Shelter immediately — lowest floor, away from windows.':'A tornado warning is in effect. Seek shelter in the lowest level of a sturdy building away from windows.';
  if(e.includes('tornado watch'))return tn==='unhinged'?'👀 Conditions are ripe for tornadoes. The atmosphere is considering chaos. Have a plan. Watch your phone.':tn==='terse'?'Tornadoes are possible. Know your shelter and stay aware.':'Conditions are favorable for tornado development. Monitor weather alerts closely.';
  if(e.includes('severe thunderstorm warning'))return tn==='unhinged'?'⛈️ A severe storm is HERE or nearly here. It\'s getting dramatic. Stay inside.':tn==='terse'?'A severe thunderstorm is arriving. Inside is the right call.':'A severe thunderstorm with damaging winds or large hail is expected. Stay indoors.';
  if(e.includes('severe thunderstorm watch'))return tn==='unhinged'?'⛈️ The atmosphere is considering violence. Storms could turn severe. Keep an eye out.':tn==='terse'?'Severe storms are possible. The sky might get dramatic.':'Conditions are favorable for severe thunderstorms. Monitor forecasts.';
  if(e.includes('flash flood warning'))return tn==='unhinged'?'🌊 WATER IS RISING FAST. TURN AROUND DON\'T DROWN. Do not drive into flooded roads. GET UPSTAIRS if needed.':tn==='terse'?'Flash flooding happening. Do not drive through water. Seriously.':'Flash flooding is occurring or imminent. Avoid flooded roads and low areas.';
  if(e.includes('flood warning'))return tn==='unhinged'?'🌊 Flooding happening or imminent. Get out of flood zones!!':tn==='terse'?'Flooding expected. Avoid low-lying areas.':'Flooding is occurring or expected soon. Move away from flood-prone areas.';
  if(e.includes('winter storm'))return tn==='unhinged'?'❄️ SIGNIFICANT WINTER STORM INCOMING. This is going to be A WHOLE THING. Stock up. Stay home if you can.':tn==='terse'?'A serious winter storm is on the way. Prepare now.':'Hazardous winter weather expected. Limit travel and prepare for disruptions.';
  if(e.includes('ice storm'))return tn==='unhinged'?'🧊 The ground is going to actively dislike you today. Ice everywhere. Stay inside if at all possible.':tn==='terse'?'Ice storm coming. Everything gets slippery. Be careful.':'Significant icing expected, creating extremely hazardous travel conditions.';
  if(e.includes('excessive heat')||e.includes('heat advisory'))return tn==='unhinged'?'🔥 THE HEAT IS DANGEROUS. HYDRATE. A/C. Check on elderly people and pets. Please.':tn==='terse'?'Dangerous heat. Stay hydrated, stay cool, check on others.':'Dangerously high temperatures expected. Stay hydrated and in air conditioning.';
  if(e.includes('high wind')||e.includes('wind advisory'))return tn==='unhinged'?'💨 HIGH WINDS!! Secure your stuff. It will go on an adventure without you.':tn==='terse'?'High winds expected. Secure loose items outdoors.':'High winds expected. Risk of downed trees and power outages.';
  return tn==='unhinged'?`The NWS issued a ${evt}. This matters. Pay attention!`:tn==='terse'?`A ${evt} is in effect for your area.`:`A ${evt} has been issued. Monitor official sources for updates.`;
}

// ─── FUTURE SUMMARY ──────────────────────────────────────────
function renderFutureSummary(){
  const ps=S.forecast?.periods||[];
  if(!ps.length){document.getElementById('fp-summary').innerHTML='<div style="padding:40px;text-align:center;color:var(--text2)">No forecast.</div>';return;}
  const days=[];
  for(let i=0;i<ps.length&&days.length<7;i+=2){
    const d=ps[i],n=ps[i+1];if(!d)break;
    days.push({name:new Date(d.startTime).toLocaleDateString('en-US',{weekday:'short'}),high:tF(d),low:n?tF(n):tF(d)-15,sf:sh(d),prec:prec(d),ico:wIco(sh(d))});
  }
  if(!days.length)return;
  const hs=days.map(d=>d.high),minH=Math.min(...hs),maxH=Math.max(...hs),rng=maxH-minH||1;
  const bi=days.reduce((b,d,i,a)=>d.prec<a[b].prec&&d.high<90?i:b,0);
  const wi=days.reduce((w,d,i,a)=>d.prec>a[w].prec||d.high>a[w].high?i:w,0);
  const hasStorm=days.some(d=>d.sf.toLowerCase().includes('thunder'));
  const hasHeat=days.some(d=>d.high>=90);
  const hasSnow=days.some(d=>d.sf.toLowerCase().includes('snow'));
  const avgP=days.reduce((s,d)=>s+d.prec,0)/days.length;
  let line='';
  if(S.tone==='unhinged'){if(hasStorm&&hasHeat)line='Hot chaos incoming. Storms AND heat. The atmosphere needs therapy.';else if(hasStorm)line='Storms on the horizon. The sky has plans, and not the fun kind.';else if(hasHeat)line="A hot week incoming. Hydrate. I'm begging you.";else if(hasSnow)line='Wintry vibes all week. The sky chose violence.';else if(avgP>50)line="A soggy week ahead. Your umbrella is about to earn its keep.";else line='A mostly calm week. Suspicious.';}
  else if(S.tone==='terse'){if(hasStorm)line='Storms somewhere this week. Keep watching.';else if(hasHeat)line='A hot week. Stay hydrated.';else if(hasSnow)line='Some wintry weather ahead.';else if(avgP>50)line='Rainy week. Umbrella weather.';else line='A fairly calm week.';}
  else{if(hasStorm)line='Storm activity is expected this week. Monitor alerts.';else if(hasHeat)line='Above-average temperatures throughout the week.';else if(hasSnow)line='Winter weather is expected this week.';else if(avgP>50)line='A predominantly wet week ahead.';else line='A calm, typical weather week ahead.';}
  const wcs=[{t:'best',tx:'Best: '+days[bi].name}];
  if(wi!==bi)wcs.push({t:'worst',tx:'Rough: '+days[wi].name});
  if(hasStorm)wcs.push({t:'warn',tx:'Storm risk'});
  if(hasHeat)wcs.push({t:'warn',tx:'Heat'});
  if(hasSnow)wcs.push({t:'warn',tx:'Winter wx'});
  if(!hasStorm&&!hasHeat&&!hasSnow)wcs.push({t:'info',tx:'No major alerts'});
  const sd=days.filter(d=>d.sf.toLowerCase().includes('thunder'));
  const rd=days.filter(d=>d.prec>=50);
  const gd=days.filter(d=>d.prec<20&&d.high<90&&d.high>40);
  const imp=[];
  if(sd.length)imp.push('Storm risk '+sd.map(d=>d.name).join(', '));
  if(rd.length)imp.push('Rain likely '+rd.map(d=>d.name).join(', '));
  if(gd.length>=2)imp.push('Nice days: '+gd.slice(0,3).map(d=>d.name).join(', '));
  let h=`<div class="fade-in">
    <div class="glass week-hero">
      <div class="wk-line">${line}</div>
      <div class="wk-chips">${wcs.map(c=>`<div class="wk-chip wkc-${c.t}">${c.tx}</div>`).join('')}</div>
      <div class="wk-impact">${imp.join(' · ')||'No major impacts expected.'}</div>
    </div>`;
  days.forEach(d=>{
    const fw=Math.round(((d.high-minH)/rng)*80)+10;
    h+=`<div class="day-row">
      <div class="dr-name">${d.name}</div>
      <div class="dr-ico">${d.ico}</div>
      <div class="dr-bar">
        <div class="dr-temps"><span class="dr-hi">${fmt(d.high)}</span><span class="dr-lo">${fmt(d.low)}</span></div>
        <div class="dr-track"><div class="dr-fill" style="width:${fw}%"></div></div>
        <div class="dr-note">${d.sf.length>36?d.sf.slice(0,36)+'…':d.sf}</div>
      </div>
      <div class="dr-prec" style="color:${d.prec>=60?'var(--red)':d.prec>=30?'var(--yellow)':'var(--text3)'}">${d.prec>5?d.prec+'%':''}</div>
    </div>`;
  });
  h+='</div>';
  document.getElementById('fp-summary').innerHTML=h;
}

function renderGraphs(){
  const ps=S.hourly?.periods||S.forecast?.periods||[];

  const wkps=S.forecast?.periods?.slice(0,7)||[];
  const bads=wkps.map(p=>{const tf=tF(p),wf=wSpd(p),pf=prec(p),sf=sh(p).toLowerCase();let s=0;if(tf>=95||tf<=10)s+=25;else if(tf>=85||tf<=20)s+=10;if(wf>=35)s+=20;else if(wf>=20)s+=8;if(pf>=70)s+=15;else if(pf>=40)s+=6;if(sf.includes('thunder'))s+=20;return Math.min(100,s+(S.alerts?.length||0)*8);});
  const blabs=wkps.map(p=>new Date(p.startTime).toLocaleDateString('en-US',{weekday:'short'}));
  document.getElementById('fp-graph').innerHTML=`<div class="fade-in">

  </div>`;
  setTimeout(()=>{drawLine('gc-temp',labs,temps,'°'+S.units);drawBars('gc-rain',labs,precs,'%',false);drawBars('gc-bad',blabs,bads,'%',true);},60);

function drawLine(id,labs,data,unit){
  const cv=document.getElementById(id);if(!cv)return;
  const ctx=cv.getContext('2d'),dpr=window.devicePixelRatio||1,w=cv.parentElement.clientWidth-36,h=140;
  cv.width=w*dpr;cv.height=h*dpr;cv.style.width=w+'px';cv.style.height=h+'px';ctx.scale(dpr,dpr);
  const tc='rgba(255,255,255,0.4)',gc='rgba(255,255,255,0.07)',lc='rgba(255,255,255,0.9)';
  const pd={t:10,r:8,b:28,l:40},cw=w-pd.l-pd.r,ch=h-pd.t-pd.b;
  const mn=Math.min(...data),mx=Math.max(...data),rn=mx-mn||1,st=data.length>1?cw/(data.length-1):cw;
  ctx.clearRect(0,0,w,h);
  [0,0.5,1].forEach(f=>{const y=pd.t+ch-ch*f;ctx.beginPath();ctx.strokeStyle=gc;ctx.lineWidth=0.5;ctx.moveTo(pd.l,y);ctx.lineTo(pd.l+cw,y);ctx.stroke();ctx.fillStyle=tc;ctx.font="10px 'DM Sans',sans-serif";ctx.textAlign='right';ctx.fillText(Math.round(mn+rn*f)+unit,pd.l-4,y+3);});
  ctx.beginPath();ctx.strokeStyle=lc;ctx.lineWidth=2;ctx.lineJoin='round';
  data.forEach((v,i)=>{const x=pd.l+i*st,y=pd.t+ch-((v-mn)/rn)*ch;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.stroke();
  const sk=Math.max(1,Math.floor(data.length/8));
  data.forEach((v,i)=>{if(i%sk!==0)return;const x=pd.l+i*st,y=pd.t+ch-((v-mn)/rn)*ch;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle=lc;ctx.fill();ctx.fillStyle=tc;ctx.font="10px 'DM Sans',sans-serif";ctx.textAlign='center';ctx.fillText(labs[i],x,h-6);});
}
function drawBars(id,labs,data,unit,colorByVal){
  const cv=document.getElementById(id);if(!cv)return;
  const ctx=cv.getContext('2d'),dpr=window.devicePixelRatio||1,w=cv.parentElement.clientWidth-36,h=120;
  cv.width=w*dpr;cv.height=h*dpr;cv.style.width=w+'px';cv.style.height=h+'px';ctx.scale(dpr,dpr);
  const tc='rgba(255,255,255,0.4)',gc='rgba(255,255,255,0.07)';
  const pd={t:8,r:8,b:26,l:36},cw=w-pd.l-pd.r,ch=h-pd.t-pd.b;
  const mx=Math.max(...data,10),bw=cw/data.length*0.6,gw=cw/data.length;
  ctx.clearRect(0,0,w,h);
  [0,50,100].forEach(v=>{const y=pd.t+ch-(v/100)*ch;ctx.beginPath();ctx.strokeStyle=gc;ctx.lineWidth=0.5;ctx.moveTo(pd.l,y);ctx.lineTo(pd.l+cw,y);ctx.stroke();ctx.fillStyle=tc;ctx.font="10px 'DM Sans',sans-serif";ctx.textAlign='right';if(unit==='%')ctx.fillText(v+'%',pd.l-4,y+3);});
  data.forEach((v,i)=>{
    const x=pd.l+i*gw+gw/2-bw/2,bh=(v/mx)*ch,y=pd.t+ch-bh;
    let col=colorByVal?(v>=70?'rgba(248,113,113,0.8)':v>=40?'rgba(251,191,36,0.8)':'rgba(74,222,128,0.7)'):(v>=70?'rgba(248,113,113,0.8)':v>=40?'rgba(251,191,36,0.7)':'rgba(96,165,250,0.7)');
    ctx.fillStyle=col;
    if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,bw,bh,3);ctx.fill();}else ctx.fillRect(x,y,bw,bh);
    ctx.fillStyle=tc;ctx.font="10px 'DM Sans',sans-serif";ctx.textAlign='center';ctx.fillText(labs[i],x+bw/2,h-6);
  });
}

async function toggleNotifs(){
  if(!('Notification' in window)){alert('Notifications not supported.');return;}
  if(Notification.permission==='denied'){alert('Notifications are blocked. Allow them in your browser settings → Site Settings.');return;}
  if(!S.notifs){

    if(p==='granted'){S.notifs=true;new Notification('TERSE Weather',{body:S.tone==='unhinged'?'Alerts enabled!! The weather cannot hide from you now.':'Severe weather alerts enabled.'});}
    else S.notifs=false;
  }else S.notifs=false;
  save();buildSettings();
}
function toggleDaily(){S.dailyNotif=!S.dailyNotif;save();if(S.dailyNotif&&Notification.permission!=='granted')toggleNotifs();else buildSettings();}

function closeLM(){document.getElementById('lm').classList.remove('open');}
